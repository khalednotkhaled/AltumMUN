    .card{
      width:100%;max-width:460px;
      display:flex;flex-direction:column;align-items:center;gap:18px;
      animation:up .9s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

    /* Logo: white circle bg, filter knocks out black JPEG background */
    .logo-wrap{
      width:110px;height:110px;border-radius:50%;
      background:rgba(255,255,255,0.25);
      display:flex;align-items:center;justify-content:center;
      border:2.5px solid rgba(255,255,255,0.75);
      box-shadow:0 4px 24px rgba(26,45,74,0.15);
      overflow:hidden;
    }
    .logo-wrap img{
      width:108px;height:108px;object-fit:contain;margin-top:1px;margin-left:4px;
      /* contrast blows up navy vs black difference, invert flips so navy=dark on white,
         multiply blend on white circle makes the white logo bg disappear */
      
    }

    /* Title */
    .info{text-align:center;}
    .info .name{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;text-shadow:0 2px 14px rgba(26,45,74,0.28);letter-spacing:.2em;text-transform:uppercase;line-height:1.2;}
    .info .sub{
      font-size:.75rem;font-weight:400;
      color:rgba(255,255,255,0.85);
      letter-spacing:.15em;text-transform:uppercase;
      margin-top:5px;
    }
    .info .meta{
      display:flex;gap:14px;justify-content:center;
      margin-top:9px;
    }
    .info .meta span{
      font-size:.82rem;color:rgba(255,255,255,0.85);
      background:rgba(255,255,255,0.18);
      padding:3px 12px;border-radius:20px;
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.32);
    }

    /* Glass rectangle — links only */
    .box{
      width:100%;
      background:rgba(255,255,255,0.20);
      backdrop-filter:blur(22px) saturate(1.6);
      -webkit-backdrop-filter:blur(22px) saturate(1.6);
      border:1.5px solid rgba(255,255,255,0.50);
      border-radius:28px;
      padding:22px 20px;
      box-shadow:0 12px 50px rgba(26,45,74,0.13),inset 0 1px 0 rgba(255,255,255,0.55);
      display:flex;flex-direction:column;gap:12px;
    }

    /* Oval pill buttons */
    .link-btn{
      display:flex;align-items:center;gap:13px;
      padding:14px 22px;
      background:rgba(255,255,255,0.30);
      border:1.5px solid rgba(255,255,255,0.62);
      border-radius:50px;
      text-decoration:none;
      color:var(--navy);
      font-size:.93rem;font-weight:500;font-family:'Outfit',sans-serif;
      letter-spacing:.02em;
      box-shadow:0 3px 16px rgba(26,45,74,0.09),inset 0 1px 0 rgba(255,255,255,0.55);
      transition:background .2s,transform .18s,box-shadow .2s;
    }
    .link-btn:hover{
      background:rgba(255,255,255,0.48);
      transform:translateY(-2px) scale(1.01);
      box-shadow:0 8px 28px rgba(26,45,74,0.15);
    }
    .link-btn:active{transform:translateY(0) scale(.99);}
